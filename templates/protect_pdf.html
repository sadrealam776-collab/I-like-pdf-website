<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protect PDF | LikePDF Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at center, #1e1b4b 0%, #0f0728 60%, #050212 100%); min-height: 100vh; overflow-x: hidden; perspective: 1500px; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .box-4d-device { background: linear-gradient(135deg, rgba(30, 27, 75, 0.75), rgba(15, 7, 40, 0.85)); backdrop-filter: blur(30px); border-top: 2px solid rgba(236, 72, 153, 0.5); box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.9), 0 0 50px rgba(236, 72, 153, 0.25), inset 0 -12px 24px rgba(0, 0, 0, 0.6); transform-style: preserve-3d; transition: transform 0.1s ease-out; }
        .core-deck { transform: translateZ(35px); background: rgba(5, 2, 18, 0.7); border: 1px solid rgba(236, 72, 153, 0.2); }
        .btn-4d-kinetic { background: linear-gradient(135deg, #ec4899, #8b5cf6); border-bottom: 4px solid #4c1d95; transform: translateZ(45px); }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4 md:p-12 text-slate-200">
    <div id="canvas-container"><canvas id="quantumMesh"></canvas></div>
    <div class="w-full max-w-4xl flex flex-col items-center gap-16 mt-4 md:mt-10 z-10">
        <div id="quantumDevice" class="box-4d-device w-full max-w-md p-6 md:p-8 rounded-[2.5rem]">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-extrabold tracking-tight mb-2 text-white">Protect PDF</h1>
                <p class="text-pink-200/60 text-xs">Encrypt and password-protect sensitive file components.</p>
            </div>
            <form id="uploadForm" action="/api/protect-pdf" method="POST" enctype="multipart/form-data" class="space-y-4">
                <div class="core-deck group relative border rounded-2xl p-6 text-center hover:border-pink-400/50 cursor-pointer">
                    <input type="file" name="file" id="pdf_file" accept=".pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required>
                    <div id="fileStatus">
                        <div class="mb-4 flex items-center justify-center gap-3">
                            <div class="text-slate-400 text-2xl"><i class="fa-solid fa-file-pdf"></i></div>
                            <div class="text-sky-400 text-xl animate-pulse"><i class="fa-solid fa-lock"></i></div>
                        </div>
                        <p class="text-slate-300 font-medium text-base" id="fileNameText">Select Target PDF</p>
                    </div>
                </div>
                <div class="bg-slate-950/40 border border-white/10 rounded-2xl p-4 space-y-2 text-xs">
                    <label class="block font-semibold text-slate-300">Set Security Password:</label>
                    <input type="password" name="password" placeholder="Enter security key" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-pink-500" required>
                </div>
                <button type="submit" id="submitBtn" class="btn-4d-kinetic w-full text-white font-bold py-3.5 px-6 rounded-xl text-sm uppercase tracking-widest">Secure Document</button>
            </form>
            <div class="text-center mt-5"><a href="/" class="text-xs text-white/70 hover:text-white">? Back to Home</a></div>
        </div>
    </div>
    <script>
        document.getElementById('pdf_file').onchange = (e) => { if(e.target.files.length > 0) document.getElementById('fileNameText').innerText = e.target.files[0].name; };
        // Quantum background integration
        const canvas = document.getElementById('quantumMesh'); const ctx = canvas.getContext('2d'); let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); }
        class Node { constructor(x, y) { this.x = x; this.y = y; this.baseX = x; this.baseY = y; this.size = Math.random() * 3 + 3; this.density = (Math.random() * 40) + 15; this.color = 'rgba(236, 72, 153, 0.75)'; } draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); } update() {} }
        function init() { particles = []; for (let i = 0; i < 50; i++) particles.push(new Node(Math.random()*canvas.width, Math.random()*canvas.height)); }
        function renderLoop() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < particles.length; i++) particles[i].draw(); requestAnimationFrame(renderLoop); }
        window.addEventListener('resize', resize); resize(); renderLoop();
    </script>
</body>
</html>
